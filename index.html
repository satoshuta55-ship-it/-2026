<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>御堂筋線 江坂方面 掲示板</title>
  <style>
    :root{
      --bg:#000000;
      --panel:#0a0a0a;
      --panel2:#121212;
      --line:#242424;
      --text:#ffffff;
      --muted:#9ca3af;
      --cyan:#22d3ee;
      --green:#34d399;
      --amber:#fcd34d;
      --red:#f87171;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;
    }
    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .phone{
      width:min(100%,460px);
      background:linear-gradient(180deg,#111,#050505);
      border:1px solid var(--line);
      border-radius:32px;
      overflow:hidden;
      box-shadow:0 24px 60px rgba(0,0,0,.45);
    }
    .head{
      padding:20px 20px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#111,#060606);
    }
    .row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .brand{
      font-size:11px;
      letter-spacing:.35em;
      color:var(--muted);
      text-transform:uppercase;
    }
    h1{
      margin:10px 0 0;
      font-size:30px;
      line-height:1.1;
      font-weight:900;
    }
    .sub{
      margin-top:6px;
      color:var(--muted);
      font-size:14px;
    }
    .clock-label{
      font-size:12px;
      color:var(--muted);
      text-align:right;
    }
    .clock{
      margin-top:4px;
      font-weight:900;
      font-size:34px;
      font-variant-numeric:tabular-nums;
      text-align:right;
    }
    .content{padding:20px}
    .card{
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:28px;
      padding:20px;
    }
    .next-tag{
      font-size:12px;
      letter-spacing:.25em;
      text-transform:uppercase;
      color:var(--cyan);
    }
    .next-main{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-end;
      margin-top:16px;
    }
    .time-big{
      font-size:68px;
      line-height:.95;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }
    .dest-big{
      margin-top:10px;
      font-size:30px;
      font-weight:800;
    }
    .remain-box{text-align:right}
    .remain-label,.remain-unit{
      color:var(--muted);
      font-size:14px;
    }
    .remain-big{
      font-size:64px;
      line-height:.95;
      font-weight:900;
      font-variant-numeric:tabular-nums;
      margin-top:4px;
    }
    .status{
      margin-top:14px;
      font-size:20px;
      font-weight:800;
    }
    .green{color:var(--green)}
    .amber{color:var(--amber)}
    .red{color:var(--red)}
    .muted{color:var(--muted)}
    .list{
      margin-top:18px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      overflow:hidden;
    }
    .thead,.item{
      display:grid;
      grid-template-columns:92px 1fr 82px;
      gap:10px;
      align-items:center;
    }
    .thead{
      padding:12px 16px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      background:#111;
    }
    .item{
      padding:15px 16px;
      border-top:1px solid #151515;
    }
    .item-time{
      font-size:30px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }
    .item-dest{
      font-size:24px;
      font-weight:800;
    }
    .item-status{
      margin-top:4px;
      font-size:14px;
      font-weight:700;
    }
    .item-remain{
      text-align:right;
    }
    .item-remain-num{
      font-size:38px;
      line-height:1;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }
    .item-remain-unit{
      color:var(--muted);
      font-size:12px;
    }
    .foot{
      margin-top:16px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
      padding-bottom:4px;
    }
    @media (max-width: 420px){
      h1{font-size:26px}
      .clock{font-size:30px}
      .time-big{font-size:58px}
      .remain-big{font-size:54px}
      .dest-big{font-size:26px}
      .thead,.item{grid-template-columns:84px 1fr 74px}
      .item-time{font-size:26px}
      .item-dest{font-size:21px}
      .item-remain-num{font-size:32px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="phone">
      <div class="head">
        <div class="row">
          <div>
            <div class="brand">Osaka Metro</div>
            <h1>御堂筋線 江坂方面</h1>
            <div class="sub">平日ダイヤ / 心斎橋駅 発</div>
          </div>
          <div>
            <div class="clock-label">現在時刻</div>
            <div class="clock" id="clock">--:--</div>
          </div>
        </div>
      </div>

      <div class="content">
        <div class="card">
          <div class="next-tag">Next Train</div>
          <div class="next-main">
            <div>
              <div class="time-big" id="next-time">--:--</div>
              <div class="dest-big" id="next-dest">---</div>
            </div>
            <div class="remain-box">
              <div class="remain-label">あと</div>
              <div class="remain-big" id="next-remain">0</div>
              <div class="remain-unit">分</div>
            </div>
          </div>
          <div class="status" id="next-status">---</div>
        </div>

        <div class="list">
          <div class="thead">
            <div>発車</div>
            <div>行先</div>
            <div style="text-align:right;">あと</div>
          </div>
          <div id="list-body"></div>
        </div>

        <div class="foot">1分ごとに自動更新 / 心斎橋駅発の掲示板風スマホ表示</div>
      </div>
    </div>
  </div>

  <script>
    const timetable = [
      ["06:12","箕面萱野"],
      ["06:22","箕面萱野"],
      ["06:31","箕面萱野"],
      ["06:35","新大阪"],
      ["06:40","箕面萱野"],
      ["06:44","新大阪"],
      ["06:48","箕面萱野"],
      ["06:52","新大阪"],
      ["06:57","箕面萱野"],
      ["07:01","箕面萱野"],
      ["07:05","箕面萱野"],
      ["07:10","新大阪"],
      ["07:14","箕面萱野"],
      ["07:18","箕面萱野"],
      ["07:21","新大阪"],
      ["07:23","箕面萱野"],
      ["07:25","中津"],
      ["07:27","箕面萱野"],
      ["07:30","新大阪"],
      ["07:32","箕面萱野"],
      ["07:34","中津"],
      ["07:36","箕面萱野"],
      ["07:39","新大阪"],
      ["07:41","箕面萱野"],
      ["07:43","中津"],
      ["07:45","箕面萱野"],
      ["07:48","新大阪"],
      ["07:50","箕面萱野"],
      ["07:52","中津"],
      ["07:54","箕面萱野"],
      ["07:57","新大阪"],
      ["07:59","箕面萱野"],
      ["08:01","中津"],
      ["08:03","箕面萱野"],
      ["08:06","新大阪"],
      ["08:08","箕面萱野"],
      ["08:10","中津"],
      ["08:12","箕面萱野"],
      ["08:15","新大阪"],
      ["08:17","箕面萱野"],
      ["08:19","中津"],
      ["08:21","箕面萱野"],
      ["08:24","新大阪"],
      ["08:26","箕面萱野"],
      ["08:28","中津"],
      ["08:30","箕面萱野"],
      ["08:33","新大阪"],
      ["08:35","箕面萱野"],
      ["08:37","中津"],
      ["08:39","箕面萱野"],
      ["08:42","新大阪"],
      ["08:44","箕面萱野"],
      ["08:46","中津"],
      ["08:48","箕面萱野"],
      ["08:51","新大阪"],
      ["08:53","箕面萱野"],
      ["08:55","中津"],
      ["08:57","箕面萱野"],
      ["09:00","新大阪"],
      ["09:02","箕面萱野"],
      ["09:04","中津"],
      ["09:07","箕面萱野"],
      ["09:09","新大阪"],
      ["09:12","箕面萱野"],
      ["09:14","中津"],
      ["09:17","箕面萱野"],
      ["09:20","新大阪"],
      ["09:23","箕面萱野"],
      ["09:28","中津"],
      ["09:32","箕面萱野"],
      ["09:36","新大阪"],
      ["09:39","箕面萱野"],
      ["09:44","箕面萱野"],
      ["09:49","中津"],
      ["09:53","箕面萱野"]
    ];

    const WALK_OK = 12;
    const FAST_OK = 6;

    const pad = (n) => String(n).padStart(2, "0");
    const toMinutes = (hhmm) => {
      const [h, m] = hhmm.split(":").map(Number);
      return h * 60 + m;
    };

    function judge(diff){
      if (diff < 0) return { label: "発車済", className: "muted" };
      if (diff >= WALK_OK) return { label: "歩いて間に合う", className: "green" };
      if (diff >= FAST_OK) return { label: "早歩きなら間に合う", className: "amber" };
      return { label: "急げ", className: "red" };
    }

    function getServices(now){
      const current = now.getHours() * 60 + now.getMinutes();
      return timetable
        .map(([time, destination]) => {
          const diff = toMinutes(time) - current;
          return { time, destination, diff, status: judge(diff) };
        })
        .filter(item => item.diff >= -1)
        .slice(0, 4);
    }

    function render(){
      const now = new Date();
      document.getElementById("clock").textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

      const services = getServices(now);
      const next = services[0];

      if (next){
        document.getElementById("next-time").textContent = next.time;
        document.getElementById("next-dest").textContent = next.destination;
        document.getElementById("next-remain").textContent = next.diff <= 0 ? "0" : String(next.diff);
        const status = document.getElementById("next-status");
        status.textContent = next.status.label;
        status.className = `status ${next.status.className}`;
      } else {
        document.getElementById("next-time").textContent = "--:--";
        document.getElementById("next-dest").textContent = "本日の表示終了";
        document.getElementById("next-remain").textContent = "0";
        const status = document.getElementById("next-status");
        status.textContent = "時刻データを追加すると続きも表示できます";
        status.className = "status muted";
      }

      const body = document.getElementById("list-body");
      body.innerHTML = services.map(item => `
        <div class="item">
          <div class="item-time">${item.time}</div>
          <div>
            <div class="item-dest">${item.destination}</div>
            <div class="item-status ${item.status.className}">${item.status.label}</div>
          </div>
          <div class="item-remain">
            <div class="item-remain-num">${item.diff <= 0 ? 0 : item.diff}</div>
            <div class="item-remain-unit">min</div>
          </div>
        </div>
      `).join("");
    }

    render();
    setInterval(render, 60 * 1000);
  </script>
</body>
</html>
